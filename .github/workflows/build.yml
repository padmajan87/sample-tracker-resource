name: Build and publish image to IBM Cloud Container Registry
on:
  release:
    types: [published]
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run ShellCheck
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: |
            sudo apt-get install -y shellcheck
            (grep -lZE '^#!(.*/|/usr/bin/env +)(bm?sh|bash|sh|zsh)' -r . --exclude-dir=.git \
                  | xargs -0 -r shellcheck -f json > shellcheck-report.json) || true
             
             echo "--- Report File Info ---"
             ls -lh shellcheck-report.json || echo "Report file NOT found!"
          
              echo "--- Files with detected issues ---"
              if [ -s shellcheck-report.json ]; then
                  grep -oP '"file":"\K[^"]+' shellcheck-report.json | sort -u || echo "No issues found in scripts."
              else
                  echo "Report is empty (no issues found)."
              fi
      - name: SonarCloud Scan
        if: github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >
            -Dsonar.shellcheck.reportPath=shellcheck-report.json
      - name: Set up Docker Buildx
        if: github.event_name == 'release'
        uses: docker/setup-buildx-action@v1
      - name: Login to Docker
        if: github.event_name == 'release'
        uses: docker/login-action@v1
        with:
            registry: icr.io
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_TOKEN }}
      - name: Build and push
        if: github.event_name == 'release'
        id: docker_build
        uses: docker/build-push-action@v2
        with:
            build-args: |
              version=${{ github.event.release.tag_name }}
            push: true
            tags: test_sample_tracker
